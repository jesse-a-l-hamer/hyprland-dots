bind = $mainMod         , Q, killactive            ,
bind = $mainMod $meh    , Q, forcekillactive       ,
bind = $mainMod         , F, fullscreen            , 0
bind = $mainMod $meh    , F, fullscreen            , 1
bind = $mainMod         , O, layoutmsg             , togglesplit
bind = $mainMod $meh    , O, exec                  , $scripts/binds/window_management/window-toggle-notify pseudo # dwindle
bind = $mainMod         , P, exec                  , $scripts/binds/window_management/window-toggle-notify togglefloating
bind = $mainMod $meh    , P, exec                  , $scripts/binds/window_management/window-toggle-notify pin
bind = $mainMod         , G, exec                  , $scripts/binds/window_management/window-toggle-notify togglegroup
bind = $mainMod CTRL    , G, lockactivegroup       , toggle
bind = $mainMod CTRL ALT, G, lockgroups            , toggle
bind = $mainMod         , C, exec                  , $pypr layout_center toggle
bind = $mainMod         , B, exec                  , $pypr toggle_special minimized # moves window to/from the "minimized" workspace
bind = $mainMod $meh    , B, togglespecialworkspace, minimized # toggles "minimized" special workspace visibility
