plugin {
    touch_gestures {
        sensitivity = 4.0

        # must be >= 3
        workspace_swipe_fingers = 3

        # anything but l,r,u,d disables
        workspace_swipe_edge = n

        long_press_delay = 400

        resize_on_border_long_press = true

        # in pixels
        edge_margin = 10

        emulate_touchpad_swipe = false

        #####################
        ### GESTURE BINDS ###
        #####################

        hyprgrass-bindm = , longpress:2, movewindow
        hyprgrass-bindm = , longpress:3, resizewindow
        hyprgrass-bind  = , longpress:4, killactive

        hyprgrass-bind = , edge:d:u, exec, ~/.scripts/toggle_wvkbd.sh
        hyprgrass-bind = , edge:d:l, exec, $pypr layout_center prev
        hyprgrass-bind = , edge:d:r, exec, $pypr layout_center next

        hyprgrass-bind = , edge:u:d, exec, ~/.scripts/toggle_nwg-drawer.sh
        hyprgrass-bind = , edge:u:l, exec, playerctl previous
        hyprgrass-bind = , edge:u:r, exec, playerctl next

        hyprgrass-bind = , edge:l:d, exec, $scripts/binds/volume down
        hyprgrass-bind = , edge:l:u, exec, $scripts/binds/volume up
        hyprgrass-bind = , edge:l:r, exec, $scripts/binds/volume mute

        hyprgrass-bind = , edge:r:d, exec, brightnessctl -e4 -n2 set 5%-
        hyprgrass-bind = , edge:r:u, exec, brightnessctl -e4 -n2 set 5%+
        hyprgrass-bind = , edge:r:l, exec, playerctl play-pause

        # hyprgrass-bind = , swipe:2:ru, exec,
        # hyprgrass-bind = , swipe:2:u,  exec,
        # hyprgrass-bind = , swipe:2:lu, exec,
        # hyprgrass-bind = , swipe:2:l,  exec,
        # hyprgrass-bind = , swipe:2:ld, exec,
        # hyprgrass-bind = , swipe:2:d,  exec,
        # hyprgrass-bind = , swipe:2:rd, exec,
        # hyprgrass-bind = , swipe:2:r,  exec,
        #
        # hyprgrass-bind = , swipe:3:ru, exec,
        # hyprgrass-bind = , swipe:3:u,  exec,
        # hyprgrass-bind = , swipe:3:lu, exec,
        # hyprgrass-bind = , swipe:3:l,  exec,
        # hyprgrass-bind = , swipe:3:ld, exec,
        # hyprgrass-bind = , swipe:3:d,  exec,
        # hyprgrass-bind = , swipe:3:rd, exec,
        # hyprgrass-bind = , swipe:3:r,  exec,

        hyprgrass-bind = , swipe:4:l,  exec, $pypr toggle email
        hyprgrass-bind = , swipe:4:ld, exec, $pypr toggle file_manager
        hyprgrass-bind = , swipe:4:d,  exec, $pypr toggle system_monitor
        hyprgrass-bind = , swipe:4:rd, exec, $pypr toggle calendar
        hyprgrass-bind = , swipe:4:r,  exec, $pypr toggle sms
        hyprgrass-bind = , swipe:4:ru, exec, $pypr toggle browser
        hyprgrass-bind = , swipe:4:u,  exec, $pypr toggle unit_monitor
        hyprgrass-bind = , swipe:4:lu, exec, $pypr toggle term

        hyprgrass-bind = , pinch:2:i, $pypr zoom ++0.5
        hyprgrass-bind = , pinch:2:o, $pypr zoom

        hyprgrass-bind = , pinch:3:i, $pypr fetch_client_menu
        hyprgrass-bind = , pinch:3:o, $pypr expose

        hyprgrass-bind = , pinch:4:i, $pypr toggle_special minimized
        hyprgrass-bind = , pinch:4:o, $pypr layout_center toggle

    }
}
